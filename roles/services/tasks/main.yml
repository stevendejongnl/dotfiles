- name: Ensures .config/systemd/user directory exists
  file: path={{ ansible_env.HOME }}/.config/systemd/user state=directory

- name: Create services
  template: src="{{ ansible_env.PWD }}/roles/services/templates/service.jinja2" dest="{{ ansible_env.HOME }}/.config/systemd/user/{{ item.name }}.service"
  with_items:
    - { name: 'clipman', exec: 'xfce4-clipman' }
    - { name: 'flameshot', exec: 'flameshot' }
    - { name: 'google-chat', exec: '/opt/google-chat-linux/google-chat-linux %U', delay: 60 }
    - { name: 'jetbrains-toolbox', exec: '/home/stevendejong/.local/share/JetBrains/Toolbox/bin/jetbrains-toolbox --minimize' }
    - { name: 'kdocker', exec: 'kdocker' }
    - { name: 'nm-applet', exec: 'nm-applet' }
    - { name: 'obsidian', exec: 'obsidian' }
    - { name: 'owncloud', exec: 'owncloud' }
    - { name: 'power-manager', exec: 'xfce4-power-manager' }
    - { name: 'slimbookbattery', exec: 'python3 /usr/share/slimbookbattery/src/slimbookbatteryindicator.py' }
    - { name: 'steam', exec: '/usr/bin/steam-runtime %U' }
    - { name: 'whatsapp', exec: 'whatsapp-nativefier', delay: 60 }
    - { name: 'xpad', exec: 'xpad' }

- name: Ensure autostart.target file exists
  copy:
    src: "{{ ansible_env.PWD }}/roles/services/files/autostart/autostart.target"
    dest: "{{ ansible_env.HOME }}/.config/systemd/user/autostart.target"

- name: Activate services
  command: systemctl --user add-wants autostart.target {{ item.service }}.service
  with_items:
    - { service: 'clipman' }
    - { service: 'flameshot' }
    - { service: 'nm-applet' }
    - { service: 'xpad' }

- name: Activate services for non virtualization systems
  command: systemctl --user add-wants autostart.target {{ item.service }}.service
  with_items:
    - { service: 'google-chat' }
    - { service: 'jetbrains-toolbox' }
    - { service: 'kdocker' }
    - { service: 'obsidian' }
    - { service: 'owncloud' }
    - { service: 'power-manager' }
    - { service: 'slimbookbattery' }
    - { service: 'steam' }
    - { service: 'whatsapp' }
  when: ansible_virtualization_role == "host"

# https://unix.stackexchange.com/questions/198444/run-script-every-30-min-with-systemd
# https://stackoverflow.com/questions/23945201/how-to-run-only-one-task-in-ansible-playbook
# https://opensource.com/article/20/7/systemd-timers
- name: Docker HealthCheck Notify Service
  template: src="{{ ansible_env.PWD }}/roles/services/templates/service.jinja2" dest="{{ ansible_env.HOME }}/.config/systemd/user/{{ item.name }}.service"
  with_items:
    - { name: 'docker-notify', type: 'oneshot', exec: '/bin/bash [docker notify script location].sh' }
  tags:
    - docker-notify
